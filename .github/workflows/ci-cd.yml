name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. BUILD BACKEND ---
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./backend/gradlew

      - name: Run Unit Tests
        working-directory: backend
        run: ./gradlew test

      - name: Build Backend JAR
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: ./gradlew bootJar -x test

      # --- 2. BUILD FRONTEND ---
      - name: Setup Node.js
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # --- 3. UPLOAD FILES TO EC2 ---
      - name: Copy files via SCP
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/*.jar,frontend/dist/*"
          target: "/home/ubuntu/yomu-deploy"

      # --- 4. DEPLOY AND START SERVICES ON EC2 ---
      - name: Execute deployment script via SSH
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            cd /home/ubuntu/yomu-deploy/backend/build/libs
            
            echo "DB_URL=$DB_URL" > .env
            echo "DB_USERNAME=$DB_USERNAME" >> .env
            echo "DB_PASSWORD=$DB_PASSWORD" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env
            
            pkill -f 'java -jar' || true
            sleep 3 # Beri jeda 3 detik agar port 8080 benar-benar bebas
            
            nohup java -jar *.jar > /home/ubuntu/yomu-backend.log 2>&1 < /dev/null &
            
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/yomu-deploy/frontend/dist/* /var/www/html/
            sudo systemctl restart nginx