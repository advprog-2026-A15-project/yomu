# Load .env whether the app is started from backend/ or repo root.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# ========== DATABASE POSTGRESQL ==========
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/yomudb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:ignored
# ========== JWT ==========
yomu.jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
yomu.jwt.expiration-ms=86400000
# ========== GOOGLE OAUTH ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
google.client-id=${GOOGLE_CLIENT_ID:}
